name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: rootpw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: rootpw
      DB_NAME: dbmaria_project

    steps:
      - uses: actions/checkout@v4

      - name: Install MariaDB client library
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev mariadb-client

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -prootpw --silent; then
              echo "MariaDB is up"
              exit 0
            fi
            sleep 2
          done
          echo "MariaDB did not become ready" >&2
          exit 1

      - name: Run tests
        run: pytest -v
